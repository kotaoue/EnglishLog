name: Generate Scoring SVG

on:
  schedule:
    - cron: '53 19 * * *'  # 30 minutes after daily-quiz (04:53 JST / 19:53 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-svg:
    runs-on: ubuntu-latest
    env:
      PIPENV_PIPFILE: scripts/daily_quiz/Pipfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install pipenv && pipenv install --deploy

      - name: Generate scoring SVG
        env:
          PYTHONPATH: scripts/daily_quiz
        run: pipenv run python scripts/daily_quiz/generate_svg.py

      - name: Commit and push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workbooks/scoring.svg
          git diff --cached --quiet || git commit -m "Update scoring SVG"
          git push
