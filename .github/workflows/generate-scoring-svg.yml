name: Generate Scoring SVG

on:
  schedule:
    - cron: '53 19 * * *'  # 30 minutes after daily-quiz (04:53 JST / 19:53 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'

      - name: Generate scoring SVG
        run: python scripts/generate_svg/generate_svg.py

      - name: Commit and push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workbooks/scoring.svg
          git diff --cached --quiet || git commit -m "Update scoring SVG"
          git push
