name: Daily English Quiz

on:
  schedule:
    - cron: '23 19 * * *'  # 4:23 JST (UTC+9)
  workflow_dispatch:
    inputs:
      base_date:
        description: '基準日 (YYYYMMDD形式)。省略時は当日を基準とします。基準日のクイズを生成し、前日の回答を採点します。'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-quiz:
    runs-on: ubuntu-latest
    env:
      PIPENV_PIPFILE: scripts/daily_quiz/Pipfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install pipenv && pipenv install --deploy

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Compute target date from base date
        id: dates
        run: |
          BASE_DATE="${{ inputs.base_date }}"
          if [ -n "$BASE_DATE" ]; then
            if ! [[ "$BASE_DATE" =~ ^[0-9]{8}$ ]]; then
              echo "Error: base_date must be in YYYYMMDD format (e.g. 20260418), got: '$BASE_DATE'" >&2
              exit 1
            fi
            TARGET=$(date -d "${BASE_DATE:0:4}-${BASE_DATE:4:2}-${BASE_DATE:6:2} - 1 day" +%Y%m%d)
          else
            TARGET=""
          fi
          echo "target_date=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Score yesterday's answers
        id: score
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ vars.GOOGLE_CLOUD_LOCATION }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          TARGET_DATE: ${{ steps.dates.outputs.target_date }}
          PYTHONPATH: scripts/daily_quiz
        run: pipenv run python scripts/daily_quiz/score_answers.py

      - name: Generate today's quiz
        id: generate
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ vars.GOOGLE_CLOUD_LOCATION }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          QUIZ_LEVEL: ${{ steps.score.outputs.level }}
          QUIZ_TODAY: ${{ inputs.base_date || steps.score.outputs.today }}
          PYTHONPATH: scripts/daily_quiz
        run: pipenv run python scripts/daily_quiz/generate_quiz.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add English quiz for ${{ steps.generate.outputs.today }}"
          branch: "quiz/${{ steps.generate.outputs.today }}"
          title: "英語読解練習帳 ${{ steps.generate.outputs.today }}"
          body: |
            ## 毎日の英語読解練習帳

            - 📅 日付: ${{ steps.generate.outputs.today }}
            - 📊 レベル: ${{ steps.generate.outputs.level }}

            前日の回答をAIで採点し、今日の読解問題をAIで生成しました。
            `workbooks/${{ steps.generate.outputs.today }}.md` を開いて回答を記入してください。
          assignees: kotaoue
          labels: quiz
          add-paths: workbooks/
