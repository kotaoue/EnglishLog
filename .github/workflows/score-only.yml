name: Score Workbook

on:
  workflow_dispatch:
    inputs:
      date:
        description: "採点対象日 (YYYYMMDD形式)"
        required: true

permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    env:
      PIPENV_PIPFILE: scripts/daily_quiz/Pipfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14.4"

      - name: Install dependencies
        run: pip install pipenv && pipenv install --deploy

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Validate date input
        run: |
          if ! [[ "${{ inputs.date }}" =~ ^[0-9]{8}$ ]]; then
            echo "Error: date must be in YYYYMMDD format (e.g. 20260325)" >&2
            exit 1
          fi

      - name: Score answers
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ vars.GOOGLE_CLOUD_LOCATION }}
          TARGET_DATE: ${{ inputs.date }}
          PYTHONPATH: scripts/daily_quiz
        run: pipenv run python scripts/daily_quiz/score_answers.py

      - name: Commit and push scoring result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workbooks/
          git diff --cached --quiet || git commit -m "Add scoring result for ${{ inputs.date }}"
          git push
